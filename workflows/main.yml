name: Build Kindle Sudoku

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  desktop-smoke:
    name: Desktop smoke build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential meson ninja-build pkg-config libgtk2.0-dev zip

      - name: Configure
        run: meson setup builddir

      - name: Compile
        run: meson compile -C builddir

      - name: Run engine smoke test
        run: meson test -C builddir --print-errorlogs

      - name: Package desktop debug KUAL zip
        run: ./scripts/package-kual.sh ./builddir/kindlesudoku

      - name: Upload desktop debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: kindlesudoku-desktop-debug-kual
          path: dist/kindlesudoku-kual.zip

  kindlehf:
    name: Kindle PW12 kindlehf build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential autoconf automake bison flex gawk libtool libtool-bin libncurses-dev curl file git gperf help2man texinfo unzip wget meson ninja-build pkg-config zip

      - name: Cache Kindle toolchain
        uses: actions/cache@v4
        with:
          path: ~/x-tools/arm-kindlehf-linux-gnueabihf
          key: koxtoolchain-kindlehf-2025-05

      - name: Download kindlehf toolchain when needed
        run: |
          if [ ! -x "$HOME/x-tools/arm-kindlehf-linux-gnueabihf/bin/arm-kindlehf-linux-gnueabihf-g++" ]; then
            curl -L -o /tmp/kindlehf.tar.gz https://github.com/koreader/koxtoolchain/releases/download/2025.05/kindlehf.tar.gz
            tar -xzf /tmp/kindlehf.tar.gz -C "$HOME"
          fi
          git clone --depth 1 https://github.com/koreader/koxtoolchain.git /tmp/koxtoolchain

      - name: Build Kindle binary
        shell: bash
        run: |
          source /tmp/koxtoolchain/refs/x-compile.sh kindlehf env
          meson setup --cross-file cross/kindlehf.txt builddir_kindlehf
          meson compile -C builddir_kindlehf
          ./scripts/package-kual.sh ./builddir_kindlehf/kindlesudoku

      - name: Upload Kindle KUAL artifact
        uses: actions/upload-artifact@v4
        with:
          name: kindlesudoku-kual
          path: dist/kindlesudoku-kual.zip
